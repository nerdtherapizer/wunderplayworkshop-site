<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forge Token</title>

<style>
:root{
--bg-top:#050505;
--bg-bottom:#140a05;
--ember:255,140,40;
--text:#f4e6d3;
--muted:#c9a77a;
--button-bg:rgba(255,140,40,.14);
--button-border:rgba(255,170,90,.45);
--button-hover:rgba(255,160,70,.22);
}

*{box-sizing:border-box;}

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:
radial-gradient(circle at 50% 85%,rgba(var(--ember),.18),transparent 28%),
linear-gradient(to bottom,var(--bg-top),var(--bg-bottom));
color:var(--text);
font-family:Georgia,"Times New Roman",serif;
}

body{
position:relative;
display:grid;
place-items:center;
isolation:isolate;
}

.forge-glow{
position:absolute;
inset:auto 50% 8%;
width:min(60vw,420px);
height:min(18vw,120px);
transform:translateX(-50%);
border-radius:999px;
background:radial-gradient(
ellipse at center,
rgba(255,120,30,.28) 0%,
rgba(255,90,20,.12) 35%,
rgba(255,70,10,.03) 60%,
transparent 75%);
filter:blur(20px);
animation:pulseGlow 4.2s ease-in-out infinite;
z-index:-2;
pointer-events:none;
}

@keyframes pulseGlow{
0%,100%{opacity:.7;transform:translateX(-50%) scale(1);}
50%{opacity:1;transform:translateX(-50%) scale(1.08);}
}

canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

.content{
width:min(92vw,640px);
text-align:center;
padding:1.5rem;
animation:fadeIn 1.4s ease-out both;
}

h1{
margin:0 0 .65rem;
font-size:clamp(2rem,5vw,3.25rem);
font-weight:600;
letter-spacing:.04em;
text-shadow:
0 0 10px rgba(255,140,40,.14),
0 0 24px rgba(255,120,20,.08);
}

p{
margin:0 auto 1.25rem;
max-width:34rem;
line-height:1.6;
font-size:clamp(1rem,2.4vw,1.15rem);
color:var(--muted);
}

.btn{
display:inline-block;
padding:.85rem 1.2rem;
border:1px solid var(--button-border);
border-radius:999px;
background:var(--button-bg);
color:var(--text);
text-decoration:none;
font-size:.98rem;
letter-spacing:.05em;
backdrop-filter:blur(6px);
transition:background 160ms ease,transform 160ms ease,border-color 160ms ease;
box-shadow:0 0 18px rgba(255,120,30,.08);
}

.btn:hover,
.btn:focus-visible{
background:var(--button-hover);
border-color:rgba(255,190,120,.6);
transform:translateY(-1px);
outline:none;
}

.subtle{
display:block;
margin-top:1rem;
font-size:.85rem;
color:rgba(244,230,211,.55);
letter-spacing:.04em;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<audio id="bgMusic" autoplay loop>
  <source src="Full Of Stars.mp3" type="audio/mpeg">
</audio>

<div class="forge-glow" aria-hidden="true"></div>
<canvas id="embers" aria-hidden="true"></canvas>

<main class="content">
  <h1>You have discovered a Forge Token.</h1>

  <p>
    This coin was created at the WunderPlay Workshop.
    If it found its way to you, the forge is still burning.
  </p>

  <a class="btn" href="https://instagram.com/wunderplayworkshop">
    Enter the Workshop
  </a>

  <span class="subtle">WunderPlayWorkshop</span>
</main>

<script>
const music = document.getElementById("bgMusic");
music.volume = 0.5;

music.play().catch(() => {
  console.log("Autoplay blocked — waiting for interaction.");
  document.body.addEventListener("click", () => {
    music.play().catch(() => {});
  }, { once: true });
});

const canvas = document.getElementById("embers");
const ctx = canvas.getContext("2d");

let width = 0;
let height = 0;
let dpr = Math.min(window.devicePixelRatio || 1, 2);
let embers = [];
const emberCount = 34;

function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  dpr = Math.min(window.devicePixelRatio || 1, 2);

  canvas.width = Math.floor(width * dpr);
  canvas.height = Math.floor(height * dpr);
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  embers = Array.from({ length: emberCount }, createEmber);
}

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function createEmber() {
  return {
    x: rand(0, width),
    y: rand(height * 0.55, height + 40),
    r: rand(1.1, 3.3),
    vx: rand(-0.12, 0.12),
    vy: rand(-0.9, -0.28),
    alpha: rand(0.18, 0.72),
    flicker: rand(0.008, 0.028),
    drift: rand(-0.4, 0.4)
  };
}

function resetEmber(e) {
  e.x = rand(0, width);
  e.y = rand(height * 0.75, height + 20);
  e.r = rand(1.1, 3.3);
  e.vx = rand(-0.12, 0.12);
  e.vy = rand(-0.9, -0.28);
  e.alpha = rand(0.18, 0.72);
  e.flicker = rand(0.008, 0.028);
  e.drift = rand(-0.4, 0.4);
}

function drawBackgroundGlow() {
  const glowY = height * 0.9;
  const glow = ctx.createRadialGradient(
    width / 2, glowY, 0,
    width / 2, glowY, Math.max(width * 0.25, 180)
  );
  glow.addColorStop(0, "rgba(255,120,30,0.08)");
  glow.addColorStop(0.4, "rgba(255,90,20,0.04)");
  glow.addColorStop(1, "rgba(255,70,10,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, width, height);
}

function animate() {
  ctx.clearRect(0, 0, width, height);
  drawBackgroundGlow();

  for (const e of embers) {
    e.x += e.vx + Math.sin(e.y * 0.01) * 0.05 + e.drift * 0.01;
    e.y += e.vy;
    e.alpha += (Math.random() - 0.5) * e.flicker;

    if (e.alpha < 0.08) e.alpha = 0.08;
    if (e.alpha > 0.9) e.alpha = 0.9;

    if (e.y < -20 || e.x < -20 || e.x > width + 20) {
      resetEmber(e);
    }

    const gradient = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * 4);
    gradient.addColorStop(0, `rgba(255,220,170,${e.alpha})`);
    gradient.addColorStop(0.35, `rgba(255,150,70,${e.alpha * 0.85})`);
    gradient.addColorStop(1, "rgba(255,120,30,0)");

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r * 4, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

resize();
animate();
window.addEventListener("resize", resize);
</script>

</body>
</html>
